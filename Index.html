<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kirim Kode</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #111;
      color: white;
      font-family: Arial, sans-serif;
    }

    .box {
      background: #1e1e1e;
      padding: 25px;
      border-radius: 15px;
      text-align: center;
      box-shadow: 0 0 15px rgba(0,255,150,0.3);
      max-width: 350px;
    }

    .kode {
      color: #00ff99;
      font-size: 24px;
      font-weight: bold;
      margin: 15px 0;
      letter-spacing: 2px;
    }

    button {
      padding: 10px 18px;
      border: none;
      border-radius: 10px;
      background: #00ff99;
      color: black;
      font-weight: bold;
      cursor: pointer;
      transition: 0.2s;
    }

    button:hover {
      transform: scale(1.05);
    }
  </style>
</head>
<body>
  <div class="box">
    <h2>Kirim Kode Ini</h2>
    <div class="kode">R4TI2W1N</div>
    <p>ke gmail:</p>
    <p><b>c2xboom@gmail.com</b></p>

    <button onclick="copyCode()">Salin Kode</button>
  </div>

  <script>
    function copyCode() {
      navigator.clipboard.writeText("R4TI2W1N");
      alert("Kode berhasil disalin!");
    }
  </script>
</body>
</html>
